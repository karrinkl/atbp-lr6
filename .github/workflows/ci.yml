name: CI/CD Tests and Reports

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  actionlint:
    name: Validate workflow with actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          fail_on_error: true

  unit-tests:
    name: Unit tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run unit tests
        run: |
          python -c "import os; os.makedirs('reports', exist_ok=True); os.makedirs('allure-results/unit', exist_ok=True)"
          pytest tests/unit --alluredir=allure-results/unit --html=reports/unit-report-${{ matrix.os }}-py${{ matrix.python-version }}.html --self-contained-html
      - name: Upload unit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-artifacts-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            reports/
            allure-results/unit/

  api-tests:
    name: API BDD tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run API tests
        run: |
          python -c "import os; os.makedirs('reports', exist_ok=True); os.makedirs('allure-results/api', exist_ok=True)"
          python scripts/run_with_server.py --server-cmd "python app.py" --target-url "http://127.0.0.1:5000/health" -- behave -f json.pretty -o reports/cucumber-report-${{ matrix.os }}-py${{ matrix.python-version }}.json -f allure_behave.formatter:AllureFormatter -o allure-results/api features
      - name: Upload API artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-artifacts-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            reports/
            allure-results/api/

  ui-tests:
    name: UI tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ matrix.browser }}-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ matrix.browser }}-
            ${{ runner.os }}-playwright-
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Install Playwright browser
        run: python -m playwright install ${{ matrix.browser }}
      - name: Run UI tests
        env:
          PLAYWRIGHT_BROWSER: ${{ matrix.browser }}
        run: |
          python -c "import os; os.makedirs('reports', exist_ok=True); os.makedirs('allure-results/ui', exist_ok=True)"
          python scripts/run_with_server.py --server-cmd "python app.py" --target-url "http://127.0.0.1:5000/health" -- pytest tests/ui --browser ${{ matrix.browser }} --alluredir=allure-results/ui --html=reports/ui-report-${{ matrix.browser }}.html --self-contained-html
      - name: Upload UI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-artifacts-${{ matrix.browser }}
          path: |
            reports/
            allure-results/ui/

  docker-tests:
    name: Dockerized tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build test image
        run: docker build --target test -t currency-converter-tests .
      - name: Run tests in container
        run: docker run --rm currency-converter-tests

  allure-report:
    name: Build Allure report
    runs-on: ubuntu-latest
    needs: [actionlint, unit-tests, api-tests, ui-tests, docker-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Merge Allure raw results
        run: |
          python - <<'PY'
          import pathlib
          import shutil

          source_root = pathlib.Path("artifacts")
          target_root = pathlib.Path("merged-allure-results")
          target_root.mkdir(parents=True, exist_ok=True)

          for path in source_root.rglob("*"):
              if path.is_file() and "allure-results" in path.parts:
                  destination = target_root / path.name
                  if destination.exists():
                      destination = target_root / f"{path.parent.name}-{path.name}"
                  shutil.copy2(path, destination)
          print("Merged files:", len(list(target_root.glob("*"))))
          PY
      - name: Setup Node for Allure CLI
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Allure CLI
        run: npm install -g allure-commandline --unsafe-perm
      - name: Generate Allure report
        run: allure generate merged-allure-results --clean -o allure-report
      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
      - name: Upload pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report/

  deploy-pages:
    name: Deploy Allure to GitHub Pages
    runs-on: ubuntu-latest
    needs: [allure-report]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

  notify-telegram:
    name: Telegram notification
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, ui-tests, docker-tests, allure-report]
    if: always()
    steps:
      - name: Compose status message
        id: message
        run: |
          RESULT="SUCCESS"
          ICON="✅"

          if [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.api-tests.result }}" != "success" ] || \
             [ "${{ needs.ui-tests.result }}" != "success" ] || \
             [ "${{ needs.docker-tests.result }}" != "success" ]; then
            RESULT="FAILED"
            ICON="❌"
          fi

          echo "text=$ICON CI pipeline $RESULT for ${{ github.repository }}%0AWorkflow: ${{ github.workflow }}%0ABranch: ${{ github.ref_name }}%0ARun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"
      - name: Send Telegram message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        if: ${{ env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != '' }}
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${{ steps.message.outputs.text }}" \
            -d "parse_mode=HTML"
