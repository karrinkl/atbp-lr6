<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Конвертер валют</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 560px;
      margin: 24px auto;
      padding: 0 12px;
      color: #1f2937;
      background: #f3f6fb;
    }
    h1 {
      margin-bottom: 12px;
      font-size: 24px;
    }
    .panel {
      background: #fff;
      border: 1px solid #dbe4f0;
      border-radius: 10px;
      padding: 16px;
    }
    .rate-badge {
      margin-bottom: 14px;
      padding: 8px 10px;
      border: 1px solid #cdd9ee;
      border-radius: 6px;
      background: #eef4ff;
      color: #1f4aa8;
      font-weight: 700;
    }
    .row { margin-bottom: 12px; }
    label { display: block; margin-bottom: 6px; font-weight: 600; }
    input, select, button {
      width: 100%;
      padding: 8px;
      font-size: 14px;
      border: 1px solid #cfd8e6;
      border-radius: 6px;
    }
    button {
      cursor: pointer;
      background: #2563eb;
      color: #fff;
      border: none;
      font-weight: 700;
    }
    #result {
      margin-top: 12px;
      color: #0b6e17;
      font-weight: 700;
    }
    #error {
      margin-top: 8px;
      color: #b00020;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Конвертер валют</h1>
    <div id="rate-badge" class="rate-badge">Текущий курс: загрузка...</div>

    <div class="row">
      <label for="from">Из валюты</label>
      <select id="from">
        {% for code in currencies %}
        <option value="{{ code }}">{{ code }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="row">
      <label for="to">В валюту</label>
      <select id="to">
        {% for code in currencies %}
        <option value="{{ code }}">{{ code }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="row">
      <label for="amount">Сумма</label>
      <input id="amount" type="number" step="0.01" value="100" />
    </div>

    <div class="row">
      <button id="convert-btn" type="button">Конвертировать</button>
    </div>

    <div id="result"></div>
    <div id="error"></div>
  </div>

  <script>
    const fromSelect = document.getElementById("from");
    const toSelect = document.getElementById("to");
    const amountInput = document.getElementById("amount");
    const convertBtn = document.getElementById("convert-btn");
    const rateBadge = document.getElementById("rate-badge");
    const resultBlock = document.getElementById("result");
    const errorBlock = document.getElementById("error");

    async function loadCurrentRate() {
      const fromCode = fromSelect.value;
      const toCode = toSelect.value;

      if (fromCode === toCode) {
        rateBadge.textContent = `Текущий курс: 1 ${fromCode} = 1 ${toCode}`;
        return;
      }

      try {
        const [fromResponse, toResponse] = await Promise.all([
          fetch(`/api/rates/${fromCode}`),
          fetch(`/api/rates/${toCode}`),
        ]);

        if (!fromResponse.ok || !toResponse.ok) {
          rateBadge.textContent = "Текущий курс: недоступен";
          return;
        }

        const fromData = await fromResponse.json();
        const toData = await toResponse.json();
        const crossRate = (fromData.rate_to_byn / toData.rate_to_byn).toFixed(4);
        rateBadge.textContent = `Текущий курс: 1 ${fromCode} = ${crossRate} ${toCode}`;
      } catch (error) {
        rateBadge.textContent = "Текущий курс: недоступен";
      }
    }

    async function convertCurrency() {
      resultBlock.textContent = "";
      errorBlock.textContent = "";

      const payload = {
        from: fromSelect.value,
        to: toSelect.value,
        amount: Number(amountInput.value),
      };

      try {
        const response = await fetch("/api/convert", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await response.json();

        if (!response.ok) {
          errorBlock.textContent = data.error || "Ошибка запроса";
          return;
        }

        resultBlock.textContent = `${data.amount} ${data.from} = ${data.result} ${data.to}`;
      } catch (error) {
        errorBlock.textContent = "Не удалось выполнить запрос к серверу";
      }
    }

    fromSelect.addEventListener("change", loadCurrentRate);
    toSelect.addEventListener("change", loadCurrentRate);
    convertBtn.addEventListener("click", convertCurrency);

    // Удобный старт для демонстрации: конвертация в BYN.
    fromSelect.value = "USD";
    toSelect.value = "BYN";
    loadCurrentRate();
  </script>
</body>
</html>
